<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 18 — Partitioning & Scaling</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 18 — Partitioning & Scaling</h1>
    <p class="subtitle">RANGE, LIST, HASH, partition pruning, sharding</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Comment fonctionne le partition pruning dans PostgreSQL ?",
        code: "-- Table partitionnée par mois\nCREATE TABLE logs (...) PARTITION BY RANGE (created_at);\n\n-- Requête ciblée\nSELECT * FROM logs WHERE created_at = '2024-06-15';",
        options: [
          "PostgreSQL scanne toutes les partitions puis filtre les résultats",
          "Le planner exclut les partitions non pertinentes basé sur les conditions WHERE — seules les partitions qui peuvent contenir les données recherchées sont scannées",
          "Les partitions sont indexées automatiquement pour accélérer l'accès",
          "Le pruning ne fonctionne qu'avec les index B-tree"
        ],
        answer: 1,
        explanation: "Le partition pruning est une optimisation du query planner. Lors de la planification, PostgreSQL analyse les conditions WHERE et les compare avec les bornes de chaque partition (définies par FOR VALUES FROM ... TO ...). Les partitions dont les bornes ne peuvent pas contenir les valeurs recherchées sont exclues du plan d'exécution — elles ne sont même pas ouvertes. Dans l'exemple, seule <code>logs_2024_06</code> est scannée. Le pruning fonctionne aussi à l'exécution (runtime pruning) avec des paramètres préparés, depuis PostgreSQL 11."
      },
      {
        label: "Code",
        text: "Vous voulez créer une contrainte UNIQUE sur une table partitionnée. Quelle est la contrainte ?",
        code: "CREATE TABLE orders (\n  id BIGSERIAL,\n  created_at DATE NOT NULL,\n  customer_id INT NOT NULL,\n  total NUMERIC(10,2)\n) PARTITION BY RANGE (created_at);\n\n-- Quelle contrainte UNIQUE est valide ?",
        options: [
          "ALTER TABLE orders ADD CONSTRAINT uq_orders UNIQUE (id);",
          "ALTER TABLE orders ADD CONSTRAINT uq_orders UNIQUE (customer_id);",
          "La contrainte UNIQUE doit inclure la clé de partition : UNIQUE (id, created_at)",
          "Les contraintes UNIQUE ne sont pas supportées sur les tables partitionnées"
        ],
        answer: 2,
        explanation: "Dans une table partitionnée, toute contrainte UNIQUE (ou PRIMARY KEY) doit obligatoirement inclure toutes les colonnes de la clé de partition. C'est parce que PostgreSQL implémente l'unicité au niveau de chaque partition individuellement (pas globalement). Sans la clé de partition dans la contrainte, PostgreSQL ne peut pas garantir l'unicité entre les partitions. Donc <code>UNIQUE (id, created_at)</code> est valide, mais <code>UNIQUE (id)</code> seul sera rejeté avec l'erreur : <em>unique constraint on partitioned table must include all partitioning columns</em>."
      },
      {
        label: "Concept",
        text: "Quand ne devrait-on PAS utiliser le partitionnement ?",
        code: null,
        options: [
          "Quand la table contient des données temporelles (time-series)",
          "Quand la table est petite (< 100K lignes) ou qu'il n'y a pas de critère naturel de partition — le partitionnement ajoute un overhead inutile",
          "Quand la table est utilisée en lecture seule",
          "Quand la table a des index B-tree"
        ],
        answer: 1,
        explanation: "Le partitionnement n'est pas toujours bénéfique. Il ajoute un overhead : le planner doit évaluer chaque partition, les contraintes UNIQUE sont plus restrictives, et la maintenance (VACUUM, index) se multiplie. Pour une petite table (< 100K lignes), un index B-tree standard est plus efficace. Le partitionnement brille quand : (1) la table dépasse les millions de lignes, (2) il y a un critère naturel de partition (date, statut, région), (3) les requêtes filtrent systématiquement sur ce critère, (4) il y a un besoin d'archivage par détachement de partitions."
      },
      {
        label: "Concept",
        text: "Que se passe-t-il quand on exécute <code>ALTER TABLE logs DETACH PARTITION logs_2024_01</code> ?",
        code: "ALTER TABLE logs DETACH PARTITION logs_2024_01;",
        options: [
          "La partition et ses données sont supprimées",
          "La partition devient une table indépendante — les données restent intactes et accessibles via le nom de la table",
          "Les données sont déplacées dans la partition par défaut",
          "La partition est marquée comme read-only mais reste attachée"
        ],
        answer: 1,
        explanation: "DETACH PARTITION transforme la partition en une table ordinaire indépendante. Les données ne sont ni supprimées ni déplacées — elles restent dans la table (qui a exactement les mêmes fichiers physiques). La table détachée n'est plus accessible via la table parente (SELECT sur logs ne verra plus les données de janvier). C'est le pattern standard pour l'archivage : on détache les vieilles partitions, on peut les compresser, les déplacer sur un tablespace moins cher, ou les sauvegarder séparément. La version CONCURRENTLY (PostgreSQL 14+) permet le détachement sans bloquer les requêtes."
      },
      {
        label: "Concept",
        text: "Quelle est la différence entre Citus et <code>postgres_fdw</code> pour le scaling horizontal ?",
        code: "-- postgres_fdw\nCREATE SERVER remote FOREIGN DATA WRAPPER postgres_fdw ...;\nCREATE FOREIGN TABLE remote_orders (...) SERVER remote;\n\n-- Citus\nSELECT create_distributed_table('orders', 'customer_id');",
        options: [
          "Citus est gratuit, postgres_fdw est payant",
          "postgres_fdw supporte le sharding automatique, Citus non",
          "Citus distribue les requêtes nativement avec sharding et colocation, postgres_fdw fait du push-down limité sur des tables distantes",
          "Ils font exactement la même chose, Citus est juste une interface graphique"
        ],
        answer: 2,
        explanation: "Citus est une extension de sharding natif pour PostgreSQL. Il distribue les tables sur plusieurs nœuds (workers) via une clé de distribution, parallélise les requêtes, et supporte la colocation (tables liées sur le même nœud pour les JOIN efficaces). <code>postgres_fdw</code> (Foreign Data Wrapper) permet d'accéder à des tables sur des serveurs PostgreSQL distants. Il fait du push-down de certaines conditions WHERE et agrégations, mais ne gère pas le sharding automatique, la parallélisation, ni la colocation. FDW est utile pour la fédération de données ; Citus est conçu pour le scaling horizontal massif."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
