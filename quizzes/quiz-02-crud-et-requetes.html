<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 02 — CRUD & Requêtes SQL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 02 — CRUD & Requêtes SQL</h1>
    <p class="subtitle">INSERT, SELECT, UPDATE, DELETE, agrégats</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Que retourne la clause RETURNING dans cette requête ?",
        code: "INSERT INTO users (name, email)\nVALUES ('Alice', 'alice@example.com')\nRETURNING id, name;",
        options: [
          "Le nombre de lignes insérées",
          "Les colonnes id et name de la ligne nouvellement insérée",
          "Toutes les lignes de la table users",
          "Un booléen indiquant si l'insertion a réussi"
        ],
        answer: 1,
        explanation: "La clause RETURNING permet de récupérer les valeurs des colonnes spécifiées pour les lignes qui viennent d'être insérées (ou modifiées/supprimées). Ici, elle retourne l'id auto-généré et le name de la nouvelle ligne. C'est très utile pour récupérer l'id généré par une séquence sans faire un SELECT supplémentaire."
      },
      {
        label: "Code",
        text: "Quelle est la différence entre WHERE et HAVING dans une requête SQL ?",
        code: "-- Requête A\nSELECT department, COUNT(*) FROM employees\nWHERE salary > 50000\nGROUP BY department;\n\n-- Requête B\nSELECT department, COUNT(*) FROM employees\nGROUP BY department\nHAVING COUNT(*) > 5;",
        options: [
          "WHERE et HAVING sont interchangeables",
          "WHERE filtre les lignes AVANT le GROUP BY, HAVING filtre les groupes APRÈS le GROUP BY",
          "HAVING est plus rapide que WHERE",
          "WHERE ne fonctionne pas avec GROUP BY"
        ],
        answer: 1,
        explanation: "WHERE filtre les lignes individuelles avant l'agrégation (GROUP BY), tandis que HAVING filtre les groupes après l'agrégation. Dans la requête A, WHERE exclut d'abord les employés avec un salaire <= 50000, puis groupe les résultats. Dans la requête B, HAVING ne garde que les départements ayant plus de 5 employés après le comptage."
      },
      {
        label: "Prédiction",
        text: "Quel sera le résultat de cette requête ?",
        code: "-- Table orders contient :\n-- | customer_id | amount |\n-- |      1      |  100   |\n-- |      1      |  200   |\n-- |      2      |  150   |\n-- |      1      |   50   |\n-- |      2      |  300   |\n\nSELECT customer_id, COUNT(*) as nb, SUM(amount) as total\nFROM orders\nGROUP BY customer_id;",
        options: [
          "customer_id=1, nb=3, total=350 | customer_id=2, nb=2, total=450",
          "customer_id=1, nb=2, total=300 | customer_id=2, nb=2, total=450",
          "Une seule ligne avec nb=5 et total=800",
          "Erreur : COUNT et SUM ne peuvent pas être dans le même SELECT"
        ],
        answer: 0,
        explanation: "GROUP BY customer_id regroupe les lignes par client. Le client 1 a 3 commandes (100+200+50=350) et le client 2 a 2 commandes (150+300=450). COUNT(*) compte le nombre de lignes dans chaque groupe et SUM(amount) additionne les montants. Plusieurs fonctions d'agrégation peuvent coexister dans le même SELECT."
      },
      {
        label: "Code",
        text: "Quand s'exécute la partie DO UPDATE dans un ON CONFLICT ?",
        code: "INSERT INTO products (sku, name, price)\nVALUES ('ABC-123', 'Widget', 29.99)\nON CONFLICT (sku) DO UPDATE\n  SET price = EXCLUDED.price,\n      name = EXCLUDED.name;",
        options: [
          "À chaque INSERT, qu'il y ait conflit ou non",
          "Quand une ligne avec le même sku existe déjà (violation d'unicité)",
          "Quand le prix est négatif",
          "Quand la table est verrouillée"
        ],
        answer: 1,
        explanation: "ON CONFLICT (sku) DO UPDATE s'exécute uniquement quand l'INSERT provoquerait une violation de la contrainte d'unicité sur la colonne sku. Si un produit avec ce sku existe déjà, au lieu d'échouer, PostgreSQL exécute l'UPDATE. EXCLUDED fait référence aux valeurs qu'on tentait d'insérer. Ce pattern s'appelle un UPSERT (INSERT or UPDATE)."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi utiliser des paramètres ($1, $2) plutôt que la concaténation de chaînes dans les requêtes SQL ?",
        code: "// DANGEREUX\nconst query = `SELECT * FROM users WHERE name = '${userInput}'`;\n\n// SÉCURISÉ\nconst query = 'SELECT * FROM users WHERE name = $1';\nawait pool.query(query, [userInput]);",
        options: [
          "Les paramètres sont plus rapides à exécuter",
          "La concaténation ne fonctionne pas avec PostgreSQL",
          "Les paramètres ($1) protègent contre les injections SQL car les valeurs sont échappées par le driver, jamais interprétées comme du SQL",
          "Les paramètres permettent de réutiliser la connexion"
        ],
        answer: 2,
        explanation: "Les parameterized queries ($1, $2) envoient la requête SQL et les valeurs séparément au serveur. PostgreSQL traite les valeurs comme des données, jamais comme du code SQL. Avec la concaténation, un utilisateur malveillant pourrait injecter du SQL (ex: ' OR 1=1 --). Les paramètres offrent aussi un avantage de performance grâce aux prepared statements réutilisables."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
