<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 04 — Transactions & ACID</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 04 — Transactions & ACID</h1>
    <p class="subtitle">BEGIN, COMMIT, ROLLBACK, SAVEPOINT, WAL</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Que signifie l'Atomicité (le A de ACID) pour une transaction ?",
        code: null,
        options: [
          "La transaction s'exécute le plus rapidement possible",
          "La transaction est indivisible : soit toutes les opérations réussissent, soit aucune n'est appliquée",
          "La transaction est exécutée de manière atomique au niveau CPU",
          "La transaction ne peut contenir qu'une seule opération"
        ],
        answer: 1,
        explanation: "L'atomicité garantit qu'une transaction est « tout ou rien ». Si une des opérations échoue (erreur, crash), toutes les modifications sont annulées (ROLLBACK). Il est impossible d'avoir un état intermédiaire où seules certaines opérations ont été appliquées. C'est essentiel pour la cohérence des données, par exemple lors d'un virement bancaire (débit + crédit)."
      },
      {
        label: "Code",
        text: "Que doit-on faire après une erreur dans une transaction PostgreSQL ?",
        code: "BEGIN;\nUPDATE accounts SET balance = balance - 100 WHERE id = 1;\n-- Erreur ici : la table 'transfers' n'existe pas\nINSERT INTO transfers (amount) VALUES (100);\n-- Que faire maintenant ?",
        options: [
          "Continuer avec d'autres requêtes, PostgreSQL ignore l'erreur",
          "Faire COMMIT pour sauvegarder les opérations réussies",
          "Faire ROLLBACK car la transaction est en état d'erreur et aucune commande ne sera acceptée",
          "Faire SAVEPOINT pour marquer le point d'erreur"
        ],
        answer: 2,
        explanation: "Dans PostgreSQL, quand une erreur survient dans une transaction, celle-ci passe en état « aborted ». Toute commande suivante (sauf ROLLBACK) sera rejetée avec « current transaction is aborted ». Il faut obligatoirement faire ROLLBACK pour terminer la transaction et annuler toutes les modifications. C'est une différence importante avec d'autres SGBDR qui peuvent continuer après une erreur."
      },
      {
        label: "Concept",
        text: "À quoi sert un SAVEPOINT dans une transaction ?",
        code: "BEGIN;\nINSERT INTO orders (product) VALUES ('A');\nSAVEPOINT sp1;\nINSERT INTO orders (product) VALUES ('B');\n-- Oups, erreur sur B\nROLLBACK TO sp1;\n-- L'insertion de A est toujours valide\nCOMMIT;",
        options: [
          "À sauvegarder automatiquement la transaction sur disque",
          "À permettre un rollback partiel sans annuler toute la transaction",
          "À créer un point de restauration de la base de données",
          "À verrouiller les lignes modifiées"
        ],
        answer: 1,
        explanation: "Un SAVEPOINT crée un point de sauvegarde à l'intérieur d'une transaction. ROLLBACK TO savepoint_name annule uniquement les opérations effectuées après ce savepoint, sans annuler les opérations précédentes. Cela permet de gérer des erreurs partielles dans des transactions longues. Sans SAVEPOINT, toute erreur oblige à faire un ROLLBACK complet de la transaction."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi PostgreSQL écrit-il dans le WAL (Write-Ahead Log) AVANT d'écrire les données sur disque ?",
        code: null,
        options: [
          "Pour accélérer les écritures en évitant les accès disque",
          "Pour compresser les données avant l'écriture",
          "Pour garantir la durabilité : en cas de crash, le WAL permet de rejouer les transactions commitées et de restaurer un état cohérent",
          "Pour permettre la réplication vers d'autres serveurs uniquement"
        ],
        answer: 2,
        explanation: "Le Write-Ahead Log garantit la durabilité (le D de ACID). Avant de modifier les fichiers de données, PostgreSQL écrit les changements séquentiellement dans le WAL. En cas de crash, au redémarrage, PostgreSQL rejoue le WAL pour restaurer les transactions commitées et annuler les non-commitées. L'écriture séquentielle dans le WAL est aussi plus rapide que les écritures aléatoires dans les fichiers de données."
      },
      {
        label: "Concept",
        text: "Que se passe-t-il quand on exécute une requête sans BEGIN explicite en mode autocommit ?",
        code: "-- Sans BEGIN\nUPDATE accounts SET balance = balance - 100 WHERE id = 1;\n-- Que s'est-il passé ?",
        options: [
          "La modification est en attente et nécessite un COMMIT explicite",
          "PostgreSQL enveloppe automatiquement la requête dans une transaction implicite (BEGIN + COMMIT)",
          "La modification est perdue car il n'y a pas de transaction",
          "PostgreSQL lève une erreur car BEGIN est obligatoire"
        ],
        answer: 1,
        explanation: "En mode autocommit (le défaut), chaque requête individuelle est automatiquement enveloppée dans sa propre transaction : PostgreSQL fait implicitement BEGIN avant et COMMIT après. Cela signifie que chaque UPDATE ou INSERT est immédiatement permanent. Pour regrouper plusieurs opérations dans une seule transaction atomique, il faut utiliser BEGIN explicitement."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
