<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz 00 — Prérequis & Vue d'ensemble</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
        color: #ffffff;
      }
      .subtitle {
        text-align: center;
        color: #8892b0;
        margin-bottom: 2rem;
        font-size: 1rem;
      }
      .progress-bar-container {
        background: #0d1117;
        border-radius: 10px;
        height: 14px;
        margin-bottom: 2rem;
        overflow: hidden;
      }
      .progress-bar {
        background: linear-gradient(90deg, #0d6efd, #4dabf7);
        height: 100%;
        width: 0%;
        border-radius: 10px;
        transition: width 0.4s ease;
      }
      .progress-text {
        text-align: center;
        color: #8892b0;
        margin-bottom: 1rem;
        font-size: 0.9rem;
      }
      .card {
        background: #16213e;
        border-radius: 12px;
        padding: 2rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .question-label {
        font-size: 0.85rem;
        color: #4dabf7;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
      }
      .question-text {
        font-size: 1.15rem;
        margin-bottom: 1.2rem;
        line-height: 1.5;
        color: #ffffff;
      }
      pre {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.2rem;
        overflow-x: auto;
        font-size: 0.95rem;
      }
      code {
        font-family: "Consolas", "Fira Code", "Courier New", monospace;
        color: #c9d1d9;
      }
      .options {
        list-style: none;
      }
      .options li {
        margin-bottom: 0.5rem;
      }
      .options label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.8rem 1rem;
        background: #0d1117;
        border: 2px solid #30363d;
        border-radius: 8px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        font-size: 1rem;
      }
      .options label:hover {
        border-color: #4dabf7;
        background: #1c2a4a;
      }
      .options input[type="radio"] {
        accent-color: #0d6efd;
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .btn {
        display: inline-block;
        padding: 0.7rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-primary {
        background: #0d6efd;
        color: #fff;
      }
      .btn-primary:hover {
        background: #3b82f6;
      }
      .btn-primary:disabled {
        background: #374151;
        cursor: not-allowed;
      }
      .btn-restart {
        background: #238636;
        color: #fff;
        margin-top: 1rem;
        padding: 0.7rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-restart:hover {
        background: #2ea043;
      }
      .feedback {
        margin-top: 1rem;
        padding: 1rem 1.2rem;
        border-radius: 8px;
        font-size: 0.95rem;
        line-height: 1.5;
        display: none;
      }
      .feedback.correct {
        background: #0f5132;
        border: 1px solid #198754;
        color: #d1fae5;
        display: block;
      }
      .feedback.wrong {
        background: #842029;
        border: 1px solid #dc3545;
        color: #fdd;
        display: block;
      }
      .score-card {
        text-align: center;
        padding: 3rem 2rem;
      }
      .score-card .score {
        font-size: 3rem;
        font-weight: 700;
        color: #4dabf7;
        margin-bottom: 0.5rem;
      }
      .score-card .score-label {
        font-size: 1.2rem;
        color: #8892b0;
        margin-bottom: 1.5rem;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Quiz 00 — Prérequis & Vue d'ensemble</h1>
      <p class="subtitle">SGBDR, PostgreSQL, architecture, setup</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">Question 1 / 5</p>
      <div id="quizContainer"></div>
      <div id="scoreContainer" class="card score-card hidden"></div>
    </div>
    <script>
      const questions = [
        {
          label: "Concept",
          text: "Qu'est-ce qui distingue fondamentalement un SGBDR d'une base NoSQL ?",
          code: null,
          options: [
            "Un SGBDR utilise le modèle relationnel avec SQL, des contraintes d'intégrité et garantit les propriétés ACID",
            "Un SGBDR est toujours plus rapide qu'une base NoSQL",
            "Un SGBDR ne peut pas stocker de données JSON",
            "Un SGBDR nécessite obligatoirement un serveur dédié",
          ],
          answer: 0,
          explanation:
            "Un SGBDR repose sur le modèle relationnel : les données sont organisées en tables avec des relations, des contraintes d'intégrité (PK, FK, CHECK) et le respect des propriétés ACID (Atomicité, Cohérence, Isolation, Durabilité). Les bases NoSQL privilégient la flexibilité du schéma et la scalabilité horizontale, mais sacrifient souvent certaines garanties ACID.",
        },
        {
          label: "Concept",
          text: "Pourquoi choisir PostgreSQL plutôt que MySQL pour des cas d'usage avancés ?",
          code: null,
          options: [
            "PostgreSQL est gratuit alors que MySQL est payant",
            "PostgreSQL supporte le MVCC natif, les types avancés (JSONB, ranges, arrays) et offre une grande extensibilité",
            "PostgreSQL est plus simple à installer que MySQL",
            "PostgreSQL consomme moins de mémoire que MySQL",
          ],
          answer: 1,
          explanation:
            "PostgreSQL se distingue par son implémentation native du MVCC (Multi-Version Concurrency Control), ses types de données avancés comme JSONB, les ranges et les arrays, ainsi que sa grande extensibilité (extensions, types custom, index custom). Ces fonctionnalités en font un choix privilégié pour les applications complexes nécessitant des requêtes avancées.",
        },
        {
          label: "Code",
          text: "Quelle commande Docker permet de lancer un conteneur PostgreSQL correctement configuré ?",
          code: "# Option A\ndocker run --name pg -e POSTGRES_PASSWORD=secret -p 5432:5432 -d postgres:17\n\n# Option B\ndocker run --name pg -p 5432:5432 -d postgres:17\n\n# Option C\ndocker start postgres -e POSTGRES_PASSWORD=secret\n\n# Option D\ndocker pull postgres && docker exec -it postgres psql",
          options: [
            "Option A : docker run avec POSTGRES_PASSWORD, port mapping et mode détaché",
            "Option B : docker run sans mot de passe",
            "Option C : docker start avec variable d'environnement",
            "Option D : docker pull suivi de docker exec",
          ],
          answer: 0,
          explanation:
            "La commande correcte utilise docker run avec la variable d'environnement POSTGRES_PASSWORD (obligatoire), le mapping de port -p 5432:5432 pour accéder au serveur depuis l'hôte, et le flag -d pour le mode détaché. Sans POSTGRES_PASSWORD, le conteneur refuse de démarrer. docker start ne crée pas un nouveau conteneur et docker exec nécessite un conteneur déjà en cours d'exécution.",
        },
        {
          label: "Concept",
          text: "Dans l'architecture PostgreSQL, quel composant est responsable d'écrire les données modifiées (dirty pages) du shared buffer vers le disque ?",
          code: null,
          options: [
            "Le postmaster",
            "Le WAL writer",
            "Le checkpointer",
            "L'autovacuum launcher",
          ],
          answer: 2,
          explanation:
            "Le checkpointer est le processus qui écrit périodiquement les dirty pages (pages modifiées en mémoire) depuis le shared buffer cache vers les fichiers de données sur disque. Le WAL writer écrit les journaux de transactions (Write-Ahead Log), tandis que le postmaster est le processus principal qui gère les connexions. L'autovacuum nettoie les dead tuples.",
        },
        {
          label: "Pourquoi ?",
          text: "Pourquoi utiliser un driver comme 'pg' (node-postgres) plutôt que psql directement dans une application ?",
          code: null,
          options: [
            "psql est plus rapide que le driver pg",
            "Le driver pg permet les parameterized queries, le connection pooling et l'intégration native dans le code applicatif",
            "psql supporte plus de types de données que le driver pg",
            "Le driver pg est obligatoire pour se connecter à PostgreSQL",
          ],
          answer: 1,
          explanation:
            "Un driver comme node-postgres (pg) offre des avantages essentiels pour une application : les parameterized queries ($1, $2) protègent contre les injections SQL, le connection pooling réutilise les connexions pour de meilleures performances, et l'intégration native permet de manipuler les résultats directement dans le code. psql est un outil interactif en ligne de commande, pas une bibliothèque d'application.",
        },
      ];

      let currentQuestion = 0,
        score = 0,
        answered = false;

      function renderQuestion() {
        if (currentQuestion >= questions.length) {
          showScore();
          return;
        }
        const q = questions[currentQuestion];
        const pct = (currentQuestion / questions.length) * 100;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          "Question " + (currentQuestion + 1) + " / " + questions.length;
        let html = '<div class="card">';
        html += '<div class="question-label">' + q.label + "</div>";
        html += '<div class="question-text">' + q.text + "</div>";
        if (q.code) html += "<pre><code>" + q.code + "</code></pre>";
        html += '<ul class="options">';
        q.options.forEach(function (opt, i) {
          html +=
            '<li><label><input type="radio" name="q" value="' +
            i +
            '"> ' +
            opt +
            "</label></li>";
        });
        html += "</ul>";
        html +=
          '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
        html += '<div class="feedback" id="feedback"></div>';
        html += "</div>";
        document.getElementById("quizContainer").innerHTML = html;
        document.getElementById("scoreContainer").classList.add("hidden");
        answered = false;
        document.querySelectorAll('input[name="q"]').forEach(function (input) {
          input.addEventListener("change", function () {
            document.getElementById("validateBtn").disabled = false;
          });
        });
      }

      function validate() {
        if (answered) return;
        answered = true;
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        const val = parseInt(selected.value);
        const q = questions[currentQuestion];
        const fb = document.getElementById("feedback");
        if (val === q.answer) {
          score++;
          fb.className = "feedback correct";
          fb.innerHTML = "<strong>Correct !</strong> " + q.explanation;
        } else {
          fb.className = "feedback wrong";
          fb.innerHTML = "<strong>Incorrect.</strong> " + q.explanation;
        }
        document.getElementById("validateBtn").disabled = true;
        setTimeout(function () {
          currentQuestion++;
          renderQuestion();
        }, 3000);
      }

      function showScore() {
        document.getElementById("quizContainer").innerHTML = "";
        document.getElementById("progressBar").style.width = "100%";
        document.getElementById("progressText").textContent = "Terminé !";
        const sc = document.getElementById("scoreContainer");
        sc.classList.remove("hidden");
        const pct = Math.round((score / questions.length) * 100);
        let msg =
          pct >= 80
            ? "Excellent travail !"
            : pct >= 60
              ? "Bon travail, quelques points à revoir."
              : "Continuez à étudier, vous progresserez !";
        sc.innerHTML =
          '<div class="score">' +
          score +
          " / " +
          questions.length +
          '</div><div class="score-label">' +
          pct +
          "% — " +
          msg +
          '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
      }

      function restart() {
        currentQuestion = 0;
        score = 0;
        answered = false;
        renderQuestion();
      }

      renderQuestion();
    </script>
  </body>
</html>
