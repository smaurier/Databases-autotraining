<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 07 — Index avancés</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 07 — Index avancés</h1>
    <p class="subtitle">GIN, GiST, BRIN, covering indexes</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Pour quel type d'opération un index GIN est-il le plus adapté ?",
        code: null,
        options: [
          "Les comparaisons simples d'égalité (=) sur des entiers",
          "Les opérations de containment (@>), existence (?) et full-text search (@@)",
          "Les requêtes avec ORDER BY",
          "Les jointures entre grandes tables"
        ],
        answer: 1,
        explanation: "GIN (Generalized Inverted Index) est conçu pour les types de données composites : JSONB (@>, ?, ?|, ?&), arrays (@>, &&), et full-text search (@@). Il crée un index inversé où chaque clé (mot, élément, clé JSON) pointe vers les lignes qui la contiennent. C'est extrêmement efficace pour les recherches de type « contient » ou « existe »."
      },
      {
        label: "Concept",
        text: "Quel est le cas d'usage idéal pour un index BRIN ?",
        code: null,
        options: [
          "Les tables avec des données aléatoires",
          "Les tables avec des données naturellement ordonnées, comme des time-series ou des logs triés par date",
          "Les petites tables de référence",
          "Les colonnes avec beaucoup de valeurs NULL"
        ],
        answer: 1,
        explanation: "BRIN (Block Range INdex) stocke des résumés (min/max) pour des groupes de pages physiques consécutives. Il est extrêmement compact (souvent < 1% de la taille d'un B-tree) mais n'est efficace que si les données sont physiquement corrélées avec l'ordre de la colonne indexée. Les time-series et logs insérés chronologiquement sont le cas d'usage parfait car les dates sont naturellement ordonnées sur disque."
      },
      {
        label: "Concept",
        text: "Quel est le trade-off entre GiST et GIN pour la recherche full-text ?",
        code: "-- Option GIN\nCREATE INDEX idx_gin ON articles USING GIN (to_tsvector('french', content));\n\n-- Option GiST\nCREATE INDEX idx_gist ON articles USING GiST (to_tsvector('french', content));",
        options: [
          "GIN et GiST ont exactement les mêmes performances",
          "GIN est plus rapide en lecture mais plus lent en écriture et prend plus d'espace ; GiST est plus compact et rapide en écriture mais plus lent en lecture",
          "GiST ne supporte pas la recherche full-text",
          "GIN ne fonctionne qu'avec des données JSONB"
        ],
        answer: 1,
        explanation: "Pour le full-text search, GIN offre des lectures ~3x plus rapides car il indexe chaque lexème individuellement (recherche exacte). En contrepartie, il est plus lent en écriture (chaque INSERT met à jour de nombreuses entrées) et prend plus d'espace. GiST utilise un arbre avec des signatures lossy, ce qui le rend plus compact et rapide en écriture, mais les lectures nécessitent des rechecks (faux positifs à vérifier)."
      },
      {
        label: "Code",
        text: "Quel est l'avantage de la clause INCLUDE dans un index ?",
        code: "CREATE INDEX idx_users_email ON users (email) INCLUDE (name, created_at);",
        options: [
          "INCLUDE permet de créer un index multi-colonnes plus rapide",
          "INCLUDE ajoute des colonnes non-clés à l'index pour permettre un Index Only Scan sans accéder à la table (heap)",
          "INCLUDE compresse les colonnes indexées",
          "INCLUDE crée automatiquement des index partiels"
        ],
        answer: 1,
        explanation: "INCLUDE ajoute des colonnes « non-clés » dans les feuilles de l'index. Quand une requête ne demande que les colonnes présentes dans l'index (clé + INCLUDE), PostgreSQL peut répondre avec un Index Only Scan sans jamais accéder à la table (heap). Ici, SELECT name, created_at FROM users WHERE email = '...' peut être résolu uniquement avec l'index, ce qui est nettement plus rapide."
      },
      {
        label: "Concept",
        text: "Quelle est la différence entre jsonb_ops et jsonb_path_ops pour un index GIN sur JSONB ?",
        code: "-- Opérateur class par défaut\nCREATE INDEX idx1 ON docs USING GIN (data);\n-- Équivalent à : USING GIN (data jsonb_ops)\n\n-- Opérateur class alternatif\nCREATE INDEX idx2 ON docs USING GIN (data jsonb_path_ops);",
        options: [
          "jsonb_ops supporte tous les opérateurs (@>, ?, ?|, ?&) mais est plus gros ; jsonb_path_ops ne supporte que @> mais est plus petit et plus rapide pour le containment",
          "jsonb_path_ops est toujours meilleur que jsonb_ops",
          "jsonb_ops ne fonctionne qu'avec PostgreSQL 15+",
          "Il n'y a aucune différence de performance"
        ],
        answer: 0,
        explanation: "jsonb_ops (défaut) indexe chaque clé et valeur séparément, ce qui supporte tous les opérateurs JSONB (@>, ?, ?|, ?&). jsonb_path_ops indexe les chemins complets (clé+valeur ensemble), ce qui le rend 2-3x plus petit et plus rapide pour les requêtes @> (containment), mais il ne supporte pas les opérateurs d'existence de clé (?, ?|, ?&). Choisissez en fonction de vos requêtes."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
