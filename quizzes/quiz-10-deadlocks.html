<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 10 — Deadlocks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 10 — Deadlocks</h1>
    <p class="subtitle">Détection, prévention, wait-for graph</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Comment PostgreSQL détecte-t-il un deadlock ?",
        code: null,
        options: [
          "En mesurant le temps d'attente de chaque transaction",
          "En analysant le wait-for graph (graphe d'attente) pour détecter un cycle",
          "En comptant le nombre de verrous actifs",
          "En vérifiant la taille des tables verrouillées"
        ],
        answer: 1,
        explanation: "PostgreSQL maintient un wait-for graph : un graphe dirigé où chaque noeud est une transaction et chaque arête « T1 attend T2 » signifie que T1 est bloquée par un verrou détenu par T2. Quand un cycle est détecté dans ce graphe (T1 attend T2, T2 attend T1), c'est un deadlock. La détection est déclenchée après un délai configurable (deadlock_timeout)."
      },
      {
        label: "Concept",
        text: "Que fait PostgreSQL quand il détecte un deadlock ?",
        code: null,
        options: [
          "Il tue toutes les transactions impliquées",
          "Il met les transactions en pause et attend une intervention manuelle",
          "Il choisit une transaction victime et fait son ROLLBACK, les autres continuent",
          "Il redémarre le serveur PostgreSQL"
        ],
        answer: 2,
        explanation: "PostgreSQL choisit une des transactions impliquées dans le deadlock comme « victime » et fait son ROLLBACK automatiquement. La victime reçoit l'erreur « deadlock detected ». Les autres transactions du cycle sont débloquées et peuvent continuer. Le choix de la victime est basé sur des critères internes (généralement la transaction qui a déclenché la détection). L'application de la victime doit réessayer sa transaction."
      },
      {
        label: "Concept",
        text: "Pourquoi le lock ordering (verrouiller les ressources dans un ordre fixe) prévient-il les deadlocks ?",
        code: "-- BONNE PRATIQUE : toujours verrouiller dans l'ordre croissant des IDs\n-- T1 : lock account 1, puis account 2\n-- T2 : lock account 1, puis account 2\n\n-- MAUVAISE PRATIQUE : ordre variable\n-- T1 : lock account 1, puis account 2\n-- T2 : lock account 2, puis account 1  -- DEADLOCK possible !",
        options: [
          "Le lock ordering rend les transactions plus rapides",
          "Le lock ordering empêche les verrous concurrents",
          "Si toutes les transactions verrouillent dans le même ordre, aucun cycle n'est possible dans le wait-for graph",
          "Le lock ordering est une fonctionnalité native de PostgreSQL"
        ],
        answer: 2,
        explanation: "Un deadlock nécessite un cycle : T1 attend T2 et T2 attend T1. Si toutes les transactions verrouillent les ressources dans le même ordre (ex: par ID croissant), une transaction qui détient un verrou sur la ressource N ne demandera jamais un verrou sur une ressource M < N. Cela rend les cycles impossibles. C'est une convention applicative, pas une fonctionnalité de PostgreSQL."
      },
      {
        label: "Prédiction",
        text: "T1 verrouille le compte A puis demande le compte B. T2 verrouille le compte B puis demande le compte A. Que va-t-il se passer ?",
        code: "-- T1                          -- T2\nBEGIN;                         BEGIN;\nUPDATE accounts               UPDATE accounts\n  SET balance = balance - 100    SET balance = balance - 50\n  WHERE id = 'A';                WHERE id = 'B';\n-- T1 a le lock sur A          -- T2 a le lock sur B\n\nUPDATE accounts               UPDATE accounts\n  SET balance = balance + 100    SET balance = balance + 50\n  WHERE id = 'B';                WHERE id = 'A';\n-- T1 attend B (détenu par T2) -- T2 attend A (détenu par T1)",
        options: [
          "Les deux transactions réussissent normalement",
          "T1 et T2 attendent indéfiniment (deadlock non détecté)",
          "PostgreSQL détecte le deadlock et fait un ROLLBACK d'une des deux transactions (la victime)",
          "PostgreSQL fusionne les deux transactions en une seule"
        ],
        answer: 2,
        explanation: "C'est un deadlock classique : T1 détient A et attend B, T2 détient B et attend A, formant un cycle. Après le délai deadlock_timeout (défaut : 1 seconde), PostgreSQL détecte le cycle dans le wait-for graph et choisit une victime dont la transaction est annulée (ROLLBACK). L'autre transaction continue et obtient le verrou qu'elle attendait. Pour éviter ce scénario, il faut verrouiller les comptes dans un ordre fixe (ex: par ID croissant)."
      },
      {
        label: "Concept",
        text: "Que configure exactement le paramètre deadlock_timeout dans PostgreSQL ?",
        code: "-- Défaut : 1 seconde\nSET deadlock_timeout = '1s';",
        options: [
          "Le temps maximum qu'une transaction peut durer avant d'être tuée",
          "Le délai d'attente avant que PostgreSQL lance la détection de deadlock sur une transaction bloquée",
          "Le nombre maximum de deadlocks autorisés par minute",
          "Le temps avant que PostgreSQL relâche automatiquement tous les verrous"
        ],
        answer: 1,
        explanation: "deadlock_timeout définit le délai avant que PostgreSQL vérifie si une transaction bloquée est dans un deadlock. Par défaut à 1 seconde, cela signifie qu'une transaction bloquée attend 1 seconde avant que la vérification du deadlock soit lancée. Ce n'est pas un timeout de la transaction. La vérification est coûteuse, donc on ne la fait pas immédiatement : la plupart des attentes se résolvent en bien moins d'une seconde."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
