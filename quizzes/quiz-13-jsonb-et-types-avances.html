<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 13 — JSONB & Types avancés</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 13 — JSONB & Types avancés</h1>
    <p class="subtitle">JSONB, arrays, ranges, full-text search</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Quelle est la différence entre les opérateurs -> et ->> en JSONB ?",
        code: "SELECT\n  data -> 'name'   AS jsonb_value,\n  data ->> 'name'  AS text_value\nFROM users\nWHERE data ->> 'email' = 'alice@test.com';",
        options: [
          "-> et ->> sont identiques, ce sont des alias",
          "-> retourne un élément JSONB (type jsonb), ->> retourne la valeur sous forme de TEXT (type text)",
          "-> est pour les objets, ->> est pour les tableaux",
          "-> est déprécié en faveur de ->>"
        ],
        answer: 1,
        explanation: "L'opérateur -> extrait un élément JSON et retourne le résultat en type JSONB (avec les guillemets pour les chaînes). L'opérateur ->> extrait et retourne en type TEXT (sans guillemets). Cette distinction est importante : pour comparer avec une chaîne SQL, utilisez ->> (qui retourne du TEXT). Pour naviguer dans un JSON imbriqué, utilisez -> pour conserver le type JSONB et chaîner les opérateurs."
      },
      {
        label: "Concept",
        text: "Que teste l'opérateur @> avec des données JSONB ?",
        code: "SELECT * FROM products\nWHERE metadata @> '{\"color\": \"red\", \"size\": \"L\"}';",
        options: [
          "L'égalité stricte entre deux documents JSON",
          "Le containment : vérifie que le JSONB de gauche contient le JSONB de droite",
          "La fusion de deux documents JSON",
          "La suppression de clés du document JSON"
        ],
        answer: 1,
        explanation: "L'opérateur @> (containment) vérifie que le document JSONB de gauche contient toutes les paires clé/valeur du document de droite. Ici, il trouve les produits dont le metadata contient au moins {\"color\": \"red\", \"size\": \"L\"}, même si le metadata a d'autres clés. Cet opérateur est très efficace avec un index GIN et est le pattern recommandé pour les requêtes sur les données JSONB."
      },
      {
        label: "Concept",
        text: "Qu'est-ce qu'un tsvector dans PostgreSQL ?",
        code: "SELECT to_tsvector('french', 'Les bases de données relationnelles');",
        options: [
          "Un type de vecteur mathématique pour le machine learning",
          "Un document préprocessé pour la recherche full-text : les mots sont normalisés (stemming), les stop words supprimés, et les positions enregistrées",
          "Un tableau de chaînes de caractères",
          "Un type binaire pour stocker des fichiers"
        ],
        answer: 1,
        explanation: "Un tsvector est le résultat du prétraitement d'un texte pour la recherche full-text. PostgreSQL applique un stemming (réduction des mots à leur racine : 'relationnelles' -> 'relationnel'), supprime les stop words ('les', 'de') et enregistre la position de chaque lexème. Cela permet des recherches rapides et linguistiquement pertinentes. Le tsquery est l'équivalent côté requête."
      },
      {
        label: "Prédiction",
        text: "Quel sera le résultat de to_tsvector avec la configuration 'french' ?",
        code: "SELECT to_tsvector('french', 'Les bases de données sont importantes');",
        options: [
          "'les':1 'bases':2 'de':3 'données':4 'sont':5 'importantes':6",
          "'bas':2 'donné':4 'important':6",
          "'base':2 'donn':4 'import':6",
          "'bases' 'données' 'importantes'"
        ],
        answer: 1,
        explanation: "Avec la configuration 'french', to_tsvector supprime les stop words français ('les', 'de', 'sont') et applique le stemming français : 'bases' -> 'bas', 'données' -> 'donné', 'importantes' -> 'important'. Les positions originales sont conservées (2, 4, 6). Ce prétraitement permet de trouver le document même si on cherche 'base', 'donnée' ou 'important' au singulier."
      },
      {
        label: "Concept",
        text: "À quoi sert une contrainte EXCLUDE avec des types range ?",
        code: "CREATE TABLE reservations (\n  room_id INTEGER,\n  during TSRANGE,\n  EXCLUDE USING GIST (room_id WITH =, during WITH &&)\n);",
        options: [
          "À empêcher les INSERT dans la table",
          "À empêcher les chevauchements (overlaps) de plages temporelles pour la même salle",
          "À supprimer automatiquement les anciennes réservations",
          "À trier les réservations par date"
        ],
        answer: 1,
        explanation: "La contrainte EXCLUDE USING GIST empêche toute insertion ou mise à jour qui créerait un conflit selon les opérateurs spécifiés. Ici : room_id WITH = (même salle) ET during WITH && (plages qui se chevauchent). Si une réservation existe de 10h à 12h pour la salle 1, toute tentative de réserver la salle 1 de 11h à 13h sera rejetée. C'est un CHECK entre lignes, ce qu'un simple CHECK ne peut pas faire."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
