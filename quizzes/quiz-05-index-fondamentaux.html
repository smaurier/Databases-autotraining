<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 05 — Index : les fondamentaux</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 05 — Index : les fondamentaux</h1>
    <p class="subtitle">B-tree, composite, partial, expression indexes</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Pourquoi un index B-tree permet-il une recherche en O(log n) ?",
        code: null,
        options: [
          "Parce qu'il stocke les données de manière compressée",
          "Parce qu'il utilise une structure arborescente équilibrée où chaque niveau divise l'espace de recherche",
          "Parce qu'il utilise un algorithme de hachage",
          "Parce qu'il ne stocke que les clés, pas les valeurs"
        ],
        answer: 1,
        explanation: "Un B-tree (Balanced tree) est un arbre équilibré où chaque noeud interne contient plusieurs clés triées et des pointeurs vers les noeuds enfants. À chaque niveau, l'espace de recherche est divisé, ce qui donne une complexité O(log n). Pour une table de 1 million de lignes, seulement ~20 comparaisons suffisent au lieu de parcourir toute la table."
      },
      {
        label: "Code",
        text: "Avec un index composite sur (a, b), quelles requêtes en profitent ?",
        code: "CREATE INDEX idx_composite ON orders (customer_id, status);\n\n-- Requête 1 : WHERE customer_id = 1 AND status = 'active'\n-- Requête 2 : WHERE customer_id = 1\n-- Requête 3 : WHERE status = 'active'\n-- Requête 4 : WHERE customer_id = 1 OR status = 'active'",
        options: [
          "Toutes les requêtes (1, 2, 3, 4)",
          "Requêtes 1 et 2 uniquement (leftmost prefix rule)",
          "Requête 1 uniquement (les deux colonnes doivent être présentes)",
          "Requêtes 1, 2 et 3"
        ],
        answer: 1,
        explanation: "Un index composite suit la règle du préfixe gauche (leftmost prefix). L'index (customer_id, status) est utilisable pour les requêtes filtrant sur customer_id seul ou sur customer_id + status. Mais une requête filtrant uniquement sur status ne peut pas utiliser cet index car status n'est pas le premier champ. C'est comme un annuaire trié par nom puis prénom : on peut chercher par nom, mais pas par prénom seul."
      },
      {
        label: "Concept",
        text: "Quel est l'avantage principal d'un partial index ?",
        code: "CREATE INDEX idx_active_users ON users (email)\n  WHERE active = true;",
        options: [
          "Il est plus rapide en écriture qu'un index complet",
          "Il couvre toutes les requêtes possibles sur la table",
          "Il est plus petit et plus rapide car il n'indexe qu'un sous-ensemble de lignes correspondant à la condition",
          "Il se met à jour automatiquement quand les données changent"
        ],
        answer: 2,
        explanation: "Un partial index n'indexe que les lignes qui satisfont la condition WHERE. Si seulement 10% des utilisateurs sont actifs, l'index est 10 fois plus petit qu'un index complet. Il est donc plus rapide à parcourir et à maintenir. Il est utilisé quand les requêtes filtrent systématiquement sur la même condition (ici WHERE active = true)."
      },
      {
        label: "Concept",
        text: "Quel est le principal inconvénient d'ajouter des index sur une table ?",
        code: null,
        options: [
          "Les index rendent les SELECT plus lents",
          "Les index empêchent les UPDATE concurrents",
          "Les index ralentissent les opérations d'écriture (INSERT, UPDATE, DELETE) car chaque index doit être mis à jour",
          "Les index consomment de la mémoire CPU"
        ],
        answer: 2,
        explanation: "Chaque index est une structure de données séparée qui doit être mise à jour à chaque INSERT, UPDATE ou DELETE. Plus une table a d'index, plus les écritures sont lentes car PostgreSQL doit maintenir la cohérence de chaque index. Il faut donc trouver un équilibre entre performance en lecture (plus d'index) et performance en écriture (moins d'index). Les index inutilisés doivent être supprimés."
      },
      {
        label: "Code",
        text: "Quand un expression index sur LOWER(email) est-il utilisé par le planner ?",
        code: "CREATE INDEX idx_email_lower ON users (LOWER(email));",
        options: [
          "Pour toute requête contenant la colonne email",
          "Uniquement pour WHERE LOWER(email) = 'alice@example.com' (la même expression que l'index)",
          "Pour WHERE email = 'alice@example.com' sans LOWER",
          "Pour WHERE email ILIKE '%alice%'"
        ],
        answer: 1,
        explanation: "Un expression index est utilisé uniquement quand la requête utilise exactement la même expression que celle de l'index. WHERE LOWER(email) = 'alice@example.com' utilise l'index car l'expression LOWER(email) correspond. WHERE email = '...' sans LOWER ne l'utilise pas. C'est un outil puissant pour les recherches case-insensitive fréquentes."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
