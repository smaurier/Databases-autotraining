<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 11 — Performances & Optimisation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 11 — Performances & Optimisation</h1>
    <p class="subtitle">Pooling, VACUUM, COPY, partitioning</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Pourquoi ?",
        text: "Pourquoi le connection pooling est-il nécessaire en production avec PostgreSQL ?",
        code: null,
        options: [
          "Pour chiffrer les connexions entre l'application et la base",
          "Parce que chaque connexion PostgreSQL crée un processus OS dédié, ce qui consomme beaucoup de mémoire",
          "Pour permettre les transactions distribuées",
          "Parce que PostgreSQL limite le nombre de requêtes par connexion"
        ],
        answer: 1,
        explanation: "PostgreSQL utilise un modèle « un processus par connexion ». Chaque connexion crée un processus backend qui consomme ~5-10 MB de mémoire. Avec 500 connexions, cela fait 2.5-5 GB de RAM juste pour les processus. Le connection pooling (PgBouncer, ou pool natif du driver) réutilise un petit nombre de connexions réelles pour servir de nombreux clients, réduisant drastiquement la consommation de ressources."
      },
      {
        label: "Concept",
        text: "Que sont les dead tuples dans PostgreSQL ?",
        code: null,
        options: [
          "Des lignes supprimées de la table et du disque",
          "Des anciennes versions de lignes non nettoyées, encore présentes sur disque mais invisibles aux transactions actives",
          "Des lignes avec des valeurs NULL",
          "Des index corrompus"
        ],
        answer: 1,
        explanation: "Dans le MVCC de PostgreSQL, un UPDATE ne modifie pas la ligne existante : il crée une nouvelle version et marque l'ancienne comme « dead ». Un DELETE marque aussi la ligne comme dead. Ces dead tuples restent physiquement sur disque tant que VACUUM ne les a pas nettoyés. Ils consomment de l'espace et ralentissent les scans car PostgreSQL doit les ignorer lors des lectures."
      },
      {
        label: "Concept",
        text: "Quelle est la différence entre VACUUM et VACUUM FULL ?",
        code: null,
        options: [
          "VACUUM est plus lent mais plus thorough que VACUUM FULL",
          "VACUUM libère l'espace des dead tuples pour réutilisation interne (sans réduire la taille du fichier), VACUUM FULL réécrit entièrement la table en la compactant",
          "VACUUM FULL ne nettoie que les index",
          "Il n'y a pas de différence, FULL est un alias"
        ],
        answer: 1,
        explanation: "VACUUM marque l'espace des dead tuples comme réutilisable par PostgreSQL, mais ne réduit pas la taille du fichier sur disque. Il est léger et peut s'exécuter en parallèle des opérations normales. VACUUM FULL réécrit entièrement la table dans un nouveau fichier compact, libérant réellement l'espace disque. Mais il prend un verrou ACCESS EXCLUSIVE (bloque tout) et est très lent. En pratique, VACUUM régulier + autovacuum suffisent."
      },
      {
        label: "Concept",
        text: "Quel est l'avantage de performance de COPY par rapport à des INSERT individuels ?",
        code: "-- INSERT individuel (lent)\nINSERT INTO logs (msg) VALUES ('a');\nINSERT INTO logs (msg) VALUES ('b');\n-- ... 100 000 fois\n\n-- COPY (rapide)\nCOPY logs (msg) FROM '/path/to/data.csv' WITH (FORMAT csv);",
        options: [
          "COPY est 2x plus rapide que INSERT",
          "COPY est 10 à 100x plus rapide car il utilise un protocole binaire en streaming, évite le parsing SQL répété et réduit les allers-retours réseau",
          "COPY et INSERT ont les mêmes performances",
          "COPY est plus rapide uniquement pour les fichiers JSON"
        ],
        answer: 1,
        explanation: "COPY est optimisé pour le chargement massif : il utilise un protocole binaire qui envoie les données en flux continu, évite le parsing et la planification SQL pour chaque ligne, et regroupe les écritures WAL. Pour 100 000 lignes, INSERT individuel peut prendre 30 secondes là où COPY le fait en moins d'une seconde. C'est l'outil standard pour les imports de données et les ETL."
      },
      {
        label: "Concept",
        text: "Comment fonctionne le partition pruning dans PostgreSQL ?",
        code: "CREATE TABLE logs (\n  id SERIAL, created_at DATE, message TEXT\n) PARTITION BY RANGE (created_at);\n\nCREATE TABLE logs_2024 PARTITION OF logs\n  FOR VALUES FROM ('2024-01-01') TO ('2025-01-01');\nCREATE TABLE logs_2025 PARTITION OF logs\n  FOR VALUES FROM ('2025-01-01') TO ('2026-01-01');",
        options: [
          "PostgreSQL supprime automatiquement les anciennes partitions",
          "Le planner n'accède qu'aux partitions pertinentes pour la requête, en éliminant les autres selon la clause WHERE",
          "PostgreSQL répartit les données aléatoirement entre les partitions",
          "Le partition pruning compresse les données dans chaque partition"
        ],
        answer: 1,
        explanation: "Le partition pruning est une optimisation du query planner. Quand une requête contient WHERE created_at = '2025-06-15', le planner détermine que seule la partition logs_2025 peut contenir cette date et ignore complètement logs_2024. Cela réduit drastiquement le volume de données à scanner. EXPLAIN montre les partitions exclues. Le pruning fonctionne aussi à l'exécution (runtime pruning) pour les valeurs dynamiques."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
