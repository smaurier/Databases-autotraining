<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 08 — Niveaux d'isolation & MVCC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 08 — Niveaux d'isolation & MVCC</h1>
    <p class="subtitle">Read Committed, Repeatable Read, Serializable, xmin/xmax</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Un dirty read (lecture de données non commitées) est-il possible dans PostgreSQL ?",
        code: null,
        options: [
          "Oui, au niveau Read Uncommitted",
          "Oui, mais uniquement avec des tables temporaires",
          "Non, jamais. Même en Read Uncommitted, PostgreSQL se comporte comme Read Committed",
          "Oui, si on désactive le MVCC"
        ],
        answer: 2,
        explanation: "PostgreSQL ne permet JAMAIS les dirty reads, quel que soit le niveau d'isolation. Même si vous configurez READ UNCOMMITTED, PostgreSQL l'implémente comme READ COMMITTED. Grâce au MVCC, chaque transaction voit un snapshot cohérent des données. Les modifications non commitées d'une transaction sont invisibles pour toutes les autres transactions."
      },
      {
        label: "Concept",
        text: "En Read Committed (le niveau par défaut), quand le snapshot est-il pris ?",
        code: null,
        options: [
          "Au début de la transaction (BEGIN)",
          "Au début de chaque instruction SQL (statement)",
          "Au premier SELECT de la transaction",
          "Au moment du COMMIT"
        ],
        answer: 1,
        explanation: "En Read Committed, chaque instruction SQL individuelle voit un snapshot pris au début de son exécution. Cela signifie que deux SELECT consécutifs dans la même transaction peuvent voir des données différentes si une autre transaction a COMMIT entre les deux. C'est pourquoi on parle de « non-repeatable reads » possibles en Read Committed."
      },
      {
        label: "Concept",
        text: "En Repeatable Read, quand le snapshot est-il pris ?",
        code: null,
        options: [
          "Au début de chaque instruction SQL",
          "Au début de la transaction (première instruction après BEGIN)",
          "Au moment de la première lecture",
          "Il n'y a pas de snapshot en Repeatable Read"
        ],
        answer: 1,
        explanation: "En Repeatable Read, le snapshot est pris au début de la transaction (lors de la première instruction après BEGIN). Toutes les instructions SQL de cette transaction voient exactement le même état de la base. Les modifications commitées par d'autres transactions pendant l'exécution sont invisibles. Cela garantit des lectures répétables mais peut échouer avec une serialization failure si un conflit de mise à jour est détecté."
      },
      {
        label: "Prédiction",
        text: "T1 lit un solde (1000). T2 met à jour le solde à 500 et COMMIT. T1 relit le solde en Repeatable Read. Que voit T1 ?",
        code: "-- T1                           -- T2\nBEGIN ISOLATION LEVEL\n  REPEATABLE READ;\nSELECT balance FROM accounts\n  WHERE id = 1;\n-- Résultat : 1000\n                                BEGIN;\n                                UPDATE accounts SET balance = 500\n                                  WHERE id = 1;\n                                COMMIT;\nSELECT balance FROM accounts\n  WHERE id = 1;\n-- Résultat : ???",
        options: [
          "500 (la valeur commitée par T2)",
          "1000 (le snapshot de T1 ne change pas)",
          "NULL (la ligne est verrouillée)",
          "Erreur : conflit de sérialisation"
        ],
        answer: 1,
        explanation: "En Repeatable Read, T1 utilise le même snapshot pendant toute la transaction. Le snapshot a été pris avant que T2 ne modifie et commite. T1 continue donc de voir le solde à 1000, même si T2 a COMMIT la modification à 500. C'est la garantie fondamentale de Repeatable Read : les lectures sont répétables au sein d'une transaction."
      },
      {
        label: "Concept",
        text: "Que doit faire l'application quand elle reçoit une erreur de « serialization failure » en mode Serializable ?",
        code: "ERROR: could not serialize access due to concurrent update",
        options: [
          "Ignorer l'erreur et continuer",
          "Passer au niveau d'isolation Read Committed",
          "Réessayer (retry) la transaction depuis le début",
          "Augmenter le timeout de la transaction"
        ],
        answer: 2,
        explanation: "Une serialization failure indique que la transaction ne peut pas être commitée car elle entrerait en conflit avec une autre transaction concurrente. L'application DOIT réessayer la transaction complète depuis le BEGIN. C'est le contrat du niveau Serializable : PostgreSQL garantit que le résultat est équivalent à une exécution séquentielle, mais peut rejeter des transactions en cas de conflit. L'application doit implémenter une boucle de retry."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
