<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Fonctions avancées SQL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Fonctions avancées SQL</h1>
    <p class="subtitle">Window functions, CTEs, recursive, LATERAL</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Quelle est la différence entre ROW_NUMBER() et RANK() ?",
        code: "SELECT name, score,\n  ROW_NUMBER() OVER (ORDER BY score DESC) as row_num,\n  RANK()       OVER (ORDER BY score DESC) as rank\nFROM players;\n-- Si deux joueurs ont le même score de 100 :",
        options: [
          "ROW_NUMBER et RANK retournent toujours le même résultat",
          "ROW_NUMBER attribue un numéro unique sans ex-aequo ; RANK attribue le même rang aux égalités et saute les suivants",
          "RANK est plus rapide que ROW_NUMBER",
          "ROW_NUMBER ne fonctionne qu'avec ORDER BY DESC"
        ],
        answer: 1,
        explanation: "ROW_NUMBER() attribue un numéro séquentiel unique à chaque ligne (1, 2, 3...), même en cas d'égalité. L'ordre entre les ex-aequo est indéterminé. RANK() attribue le même rang aux lignes à égalité et saute ensuite (1, 1, 3...). Il existe aussi DENSE_RANK() qui ne saute pas (1, 1, 2...). Le choix dépend du besoin métier."
      },
      {
        label: "Prédiction",
        text: "Quel sera le résultat de cette window function avec SUM OVER (ORDER BY) ?",
        code: "-- Table sales : (month, amount)\n-- ('Jan', 100), ('Feb', 200), ('Mar', 150)\n\nSELECT month, amount,\n  SUM(amount) OVER (ORDER BY month) as running_total\nFROM sales;",
        options: [
          "Jan: 100, running=450 | Feb: 200, running=450 | Mar: 150, running=450",
          "Jan: 100, running=100 | Feb: 200, running=300 | Mar: 150, running=450",
          "Jan: 100, running=100 | Feb: 200, running=200 | Mar: 150, running=150",
          "Erreur : SUM ne peut pas être utilisé avec OVER"
        ],
        answer: 1,
        explanation: "SUM(amount) OVER (ORDER BY month) calcule un cumul glissant (running total). Par défaut, la fenêtre s'étend du début de la partition jusqu'à la ligne courante (RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW). Jan voit seulement son montant (100), Feb voit Jan+Feb (300), Mar voit tout (450). C'est un pattern très courant pour les rapports financiers."
      },
      {
        label: "Concept",
        text: "Quelles sont les composantes obligatoires d'une CTE récursive ?",
        code: "WITH RECURSIVE hierarchy AS (\n  -- Terme initial (ancre)\n  SELECT id, name, parent_id, 0 as depth\n  FROM categories WHERE parent_id IS NULL\n\n  UNION ALL\n\n  -- Terme récursif\n  SELECT c.id, c.name, c.parent_id, h.depth + 1\n  FROM categories c\n  JOIN hierarchy h ON c.parent_id = h.id\n)\nSELECT * FROM hierarchy;",
        options: [
          "Un SELECT initial et un LIMIT pour éviter les boucles infinies",
          "Un terme initial (ancre), UNION ALL, et un terme récursif qui référence la CTE elle-même",
          "Deux tables différentes et un JOIN entre elles",
          "Un SELECT avec GROUP BY et un HAVING"
        ],
        answer: 1,
        explanation: "Une CTE récursive a trois composantes obligatoires : (1) le terme initial (ancre) qui définit le point de départ (ici les catégories racines), (2) UNION ALL qui combine les résultats, et (3) le terme récursif qui référence la CTE elle-même pour itérer. PostgreSQL exécute l'ancre, puis répète le terme récursif jusqu'à ce qu'il ne retourne plus de lignes. Attention aux boucles infinies si les données ont des cycles !"
      },
      {
        label: "Concept",
        text: "Quel est l'avantage de LATERAL JOIN par rapport à une sous-requête corrélée ?",
        code: "SELECT u.name, recent.*\nFROM users u\nCROSS JOIN LATERAL (\n  SELECT * FROM orders\n  WHERE orders.user_id = u.id\n  ORDER BY created_at DESC\n  LIMIT 3\n) recent;",
        options: [
          "LATERAL est un simple alias pour une sous-requête corrélée",
          "LATERAL permet à une sous-requête dans le FROM de référencer les colonnes des tables précédentes, et de retourner plusieurs lignes/colonnes",
          "LATERAL ne fonctionne qu'avec des tables temporaires",
          "LATERAL est plus lent qu'une sous-requête classique"
        ],
        answer: 1,
        explanation: "LATERAL permet à une sous-requête dans la clause FROM de référencer les colonnes des éléments FROM qui la précèdent (ici u.id). Contrairement à une sous-requête corrélée dans le SELECT (qui ne peut retourner qu'une seule valeur), LATERAL peut retourner plusieurs lignes et colonnes. C'est idéal pour les « top-N par groupe » comme ici : les 3 dernières commandes de chaque utilisateur."
      },
      {
        label: "Concept",
        text: "À quoi est équivalent GROUPING SETS en SQL ?",
        code: "SELECT department, region, SUM(salary)\nFROM employees\nGROUP BY GROUPING SETS (\n  (department, region),\n  (department),\n  ()\n);",
        options: [
          "À un simple GROUP BY avec toutes les colonnes",
          "À plusieurs GROUP BY combinés en une seule passe (UNION ALL de plusieurs agrégations)",
          "À un DISTINCT sur les colonnes de regroupement",
          "À un HAVING qui filtre plusieurs conditions"
        ],
        answer: 1,
        explanation: "GROUPING SETS permet d'exécuter plusieurs agrégations en une seule passe sur les données, équivalent à un UNION ALL de plusieurs requêtes GROUP BY. Ici, on obtient : les totaux par (department, region), les totaux par department seul, et le total global. Sans GROUPING SETS, il faudrait 3 requêtes séparées avec UNION ALL. ROLLUP et CUBE sont des raccourcis pour des GROUPING SETS courants."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
