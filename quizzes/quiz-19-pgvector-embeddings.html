<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Quiz — pgvector & Recherche semantique par embeddings</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh;padding:2rem 1rem}.container{max-width:800px;margin:0 auto}h1{text-align:center;margin-bottom:.5rem;font-size:1.8rem;color:#fff}.subtitle{text-align:center;color:#8892b0;margin-bottom:2rem;font-size:1rem}.progress-bar-container{background:#0d1117;border-radius:10px;height:14px;margin-bottom:2rem;overflow:hidden}.progress-bar{background:linear-gradient(90deg,#0d6efd,#4dabf7);height:100%;width:0%;border-radius:10px;transition:width .4s ease}.progress-text{text-align:center;color:#8892b0;margin-bottom:1rem;font-size:.9rem}.card{background:#16213e;border-radius:12px;padding:2rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,.3)}.question-label{font-size:.85rem;color:#4dabf7;text-transform:uppercase;letter-spacing:1px;margin-bottom:.5rem}.question-text{font-size:1.15rem;margin-bottom:1.2rem;line-height:1.5;color:#fff}pre{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:1rem;margin-bottom:1.2rem;overflow-x:auto;font-size:.95rem}code{font-family:'Consolas','Fira Code','Courier New',monospace;color:#c9d1d9}.options{list-style:none}.options li{margin-bottom:.5rem}.options label{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;background:#0d1117;border:2px solid #30363d;border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s;font-size:1rem}.options label:hover{border-color:#4dabf7;background:#1c2a4a}.options input[type=radio]{accent-color:#0d6efd;width:18px;height:18px;flex-shrink:0}.btn{display:inline-block;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}.btn-primary{background:#0d6efd;color:#fff}.btn-primary:hover{background:#3b82f6}.btn-primary:disabled{background:#374151;cursor:not-allowed}.btn-restart{background:#238636;color:#fff;margin-top:1rem;padding:.7rem 2rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer}.btn-restart:hover{background:#2ea043}.feedback{margin-top:1rem;padding:1rem 1.2rem;border-radius:8px;font-size:.95rem;line-height:1.5;display:none}.feedback.correct{background:#0f5132;border:1px solid #198754;color:#d1fae5;display:block}.feedback.wrong{background:#842029;border:1px solid #dc3545;color:#fdd;display:block}.score-card{text-align:center;padding:3rem 2rem}.score-card .score{font-size:3rem;font-weight:700;color:#4dabf7;margin-bottom:.5rem}.score-card .score-label{font-size:1.2rem;color:#8892b0;margin-bottom:1.5rem}.hidden{display:none}</style></head><body><div class="container"><h1>Quiz — pgvector & Embeddings</h1><p class="subtitle">Module 19 — Recherche semantique par embeddings dans PostgreSQL</p><div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div><p class="progress-text" id="progressText">Question 1 / 5</p><div id="quizContainer"></div><div id="scoreContainer" class="card score-card hidden"></div></div><script>const questions=[{label:"Question 1 — Operateurs de distance",text:"Quel operateur pgvector est recommande par defaut pour la recherche semantique sur des embeddings textuels ?",options:["<code>&lt;-&gt;</code> (distance euclidienne L2)","<code>&lt;#&gt;</code> (produit scalaire negatif)","<code>&lt;=&gt;</code> (distance cosinus)","<code>@@</code> (full-text search)"],answer:2,explanation:"L'operateur <code>&lt;=&gt;</code> (cosinus) est le choix par defaut pour la recherche semantique. Il est insensible a la magnitude des vecteurs et est recommande par OpenAI et Cohere pour leurs embeddings."},{label:"Question 2 — Index vectoriels",text:"Quelle est la principale difference entre les index IVFFlat et HNSW dans pgvector ?",options:["IVFFlat offre un meilleur recall que HNSW","HNSW supporte nativement les insertions incrementales, contrairement a IVFFlat qui necessite un REINDEX periodique","IVFFlat est plus lent a construire que HNSW","HNSW ne peut pas etre utilise avec l'operateur cosinus"],answer:1,explanation:"HNSW supporte nativement les insertions incrementales sans degradation, alors qu'IVFFlat necessite un REINDEX periodique. HNSW offre aussi un meilleur recall (95-99% vs 85-95%) mais est plus lent a construire."},{label:"Question 3 — Dimensions et modeles",text:"Vous utilisez le modele OpenAI <code>text-embedding-3-small</code>. Quelle dimension devez-vous specifier pour la colonne vectorielle ?",options:["384","1024","3072","1536"],answer:3,explanation:"Le modele OpenAI <code>text-embedding-3-small</code> produit des vecteurs de dimension 1536. C'est le meilleur rapport qualite/prix pour la plupart des cas d'usage selon le module."},{label:"Question 4 — Recherche hybride",text:"Quel est l'avantage principal de pgvector par rapport aux bases vectorielles dediees comme Pinecone ?",options:["pgvector supporte des milliards de vecteurs","pgvector permet de combiner la recherche semantique avec des filtres SQL (WHERE) et des jointures natives","pgvector est toujours plus rapide pour les requetes vectorielles","pgvector ne necessite aucune configuration d'index"],answer:1,explanation:"La force de pgvector est de combiner la recherche semantique avec des filtres SQL classiques (WHERE, JOIN) et les transactions ACID, le tout sur la meme infrastructure PostgreSQL existante. Les bases dediees ne supportent pas les jointures SQL natives."},{label:"Question 5 — Compatibilite des embeddings",text:"Peut-on comparer la distance entre un vecteur genere par OpenAI (dimension 1536) et un vecteur genere par Cohere (dimension 1024) stockes dans la meme table ?",options:["Oui, pgvector normalise automatiquement les dimensions","Oui, si on utilise l'operateur produit scalaire <code>&lt;#&gt;</code>","Non, car les dimensions sont differentes et les espaces vectoriels incompatibles — pgvector retournera une erreur","Oui, si les deux modeles ont ete entraines sur les memes donnees"],answer:2,explanation:"Les vecteurs de modeles differents vivent dans des espaces vectoriels differents et ne sont pas comparables. pgvector refuserait l'operation car les dimensions ne correspondent pas (<code>ERROR: different vector dimensions</code>). Il faut toujours utiliser le meme modele pour tous les embeddings d'une colonne."}];let currentQuestion=0,score=0,answered=false;function renderQuestion(){const q=questions[currentQuestion],total=questions.length;document.getElementById('progressBar').style.width=((currentQuestion/total)*100)+'%';document.getElementById('progressText').textContent=`Question ${currentQuestion+1} / ${total}`;let html=`<div class="card"><p class="question-label">${q.label}</p><p class="question-text">${q.text}</p>`;if(q.code)html+=`<pre><code>${q.code}</code></pre>`;html+=`<ul class="options">`;q.options.forEach((opt,i)=>{html+=`<li><label><input type="radio" name="q" value="${i}"> ${opt}</label></li>`;});html+=`</ul><button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button><div class="feedback" id="feedback"></div></div>`;document.getElementById('quizContainer').innerHTML=html;document.querySelectorAll('input[name="q"]').forEach(r=>{r.addEventListener('change',()=>{document.getElementById('validateBtn').disabled=false;});});answered=false;}function validate(){if(answered){currentQuestion++;if(currentQuestion<questions.length)renderQuestion();else showScore();return;}answered=true;const selected=document.querySelector('input[name="q"]:checked');if(!selected)return;const val=parseInt(selected.value),q=questions[currentQuestion];const fb=document.getElementById('feedback'),btn=document.getElementById('validateBtn');document.querySelectorAll('input[name="q"]').forEach(r=>r.disabled=true);if(val===q.answer){score++;fb.className='feedback correct';fb.innerHTML=`<strong>Correct !</strong> ${q.explanation}`;}else{fb.className='feedback wrong';fb.innerHTML=`<strong>Incorrect.</strong> ${q.explanation}`;}btn.textContent=currentQuestion<questions.length-1?'Suivant':'Voir le score';}function showScore(){document.getElementById('quizContainer').classList.add('hidden');document.getElementById('progressBar').style.width='100%';document.getElementById('progressText').textContent='Termine !';const sc=document.getElementById('scoreContainer');sc.classList.remove('hidden');const pct=Math.round((score/questions.length)*100);let msg=pct===100?'Parfait !':pct>=60?'Bien joue !':'Continuez a reviser !';sc.innerHTML=`<div class="score">${score} / ${questions.length}</div><div class="score-label">${msg} (${pct}%)</div><button class="btn-restart" onclick="restart()">Recommencer</button>`;}function restart(){currentQuestion=0;score=0;answered=false;document.getElementById('scoreContainer').classList.add('hidden');document.getElementById('quizContainer').classList.remove('hidden');renderQuestion();}renderQuestion();</script></body></html>
