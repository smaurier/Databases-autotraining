<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 06 — Le Query Planner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 06 — Le Query Planner</h1>
    <p class="subtitle">EXPLAIN, scan types, join strategies, coûts</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Concept",
        text: "Quelle est la différence entre EXPLAIN et EXPLAIN ANALYZE ?",
        code: "EXPLAIN SELECT * FROM users WHERE email = 'alice@test.com';\n\nEXPLAIN ANALYZE SELECT * FROM users WHERE email = 'alice@test.com';",
        options: [
          "EXPLAIN ANALYZE est plus rapide car il utilise un cache",
          "EXPLAIN montre le plan estimé, EXPLAIN ANALYZE exécute réellement la requête et montre les temps réels",
          "EXPLAIN ANALYZE ne fonctionne qu'avec SELECT, pas UPDATE",
          "Il n'y a pas de différence, c'est un alias"
        ],
        answer: 1,
        explanation: "EXPLAIN affiche le plan d'exécution estimé par le planner (coûts estimés, nombre de lignes estimé) sans exécuter la requête. EXPLAIN ANALYZE exécute réellement la requête et compare les estimations avec les valeurs réelles (temps réel, lignes réelles). Attention : EXPLAIN ANALYZE sur un UPDATE/DELETE modifie vraiment les données ! Utilisez-le dans une transaction avec ROLLBACK si nécessaire."
      },
      {
        label: "Code",
        text: "EXPLAIN montre un Seq Scan alors qu'un index existe. Pourquoi le planner ne choisit-il pas l'Index Scan ?",
        code: "-- Index existe sur users(status)\nEXPLAIN SELECT * FROM users WHERE status = 'active';\n-- Résultat : Seq Scan on users  (cost=0.00..35.50 rows=950 width=...)\n--   Filter: (status = 'active')\n-- La table contient 1000 lignes, 950 sont 'active'",
        options: [
          "L'index est corrompu et doit être recréé",
          "Le planner estime qu'un Seq Scan est plus rapide car la requête retourne 95% des lignes (faible sélectivité)",
          "PostgreSQL n'utilise jamais les index sur les colonnes TEXT",
          "Il faut faire ANALYZE avant que l'index soit utilisable"
        ],
        answer: 1,
        explanation: "Le planner choisit le plan avec le coût le plus bas. Quand une requête retourne une grande partie de la table (ici 95%), un Seq Scan (lecture séquentielle) est plus efficace qu'un Index Scan qui ferait des accès aléatoires au disque pour presque chaque ligne. L'Index Scan est avantageux quand la sélectivité est élevée (peu de lignes retournées, typiquement < 10-15% de la table)."
      },
      {
        label: "Concept",
        text: "Quand le planner choisit-il un Bitmap Index Scan plutôt qu'un Index Scan ou un Seq Scan ?",
        code: null,
        options: [
          "Quand la table est trop petite pour un Index Scan",
          "Quand trop de lignes correspondent pour un Index Scan efficace, mais pas assez pour justifier un Seq Scan complet",
          "Quand l'index est de type GIN ou GiST",
          "Quand la requête contient un ORDER BY"
        ],
        answer: 1,
        explanation: "Le Bitmap Index Scan est un compromis entre Index Scan et Seq Scan. Il parcourt l'index pour créer un bitmap des pages à lire, puis lit ces pages séquentiellement (Bitmap Heap Scan). C'est optimal quand la sélectivité est moyenne : trop de lignes pour un Index Scan efficace (qui ferait trop d'accès aléatoires), mais pas assez pour qu'un Seq Scan complet soit optimal. Il peut aussi combiner plusieurs index avec des opérations AND/OR."
      },
      {
        label: "Concept",
        text: "Quand le planner préfère-t-il un Hash Join plutôt qu'un Nested Loop ?",
        code: null,
        options: [
          "Hash Join est toujours plus rapide que Nested Loop",
          "Quand les deux ensembles sont grands et la condition de jointure est une égalité (=)",
          "Quand la jointure utilise un opérateur de comparaison (<, >)",
          "Quand une des tables n'a pas d'index"
        ],
        answer: 1,
        explanation: "Hash Join est efficace quand les deux ensembles à joindre sont grands et la condition est une égalité (=). PostgreSQL construit une table de hachage en mémoire sur le plus petit ensemble, puis parcourt le plus grand en cherchant les correspondances dans la table de hachage (O(n+m)). Nested Loop est préféré quand un ensemble est petit (la boucle externe est petite) ou quand un index permet des lookups rapides."
      },
      {
        label: "Concept",
        text: "Quel est l'impact du paramètre random_page_cost sur le choix entre Index Scan et Seq Scan ?",
        code: null,
        options: [
          "Il définit la taille maximale de l'index",
          "Il n'a aucun impact sur le choix du plan",
          "Une valeur élevée pénalise l'Index Scan (accès aléatoires) et favorise le Seq Scan (accès séquentiels)",
          "Une valeur basse désactive tous les index"
        ],
        answer: 2,
        explanation: "random_page_cost (défaut : 4.0) représente le coût estimé d'un accès aléatoire au disque par rapport à un accès séquentiel (seq_page_cost = 1.0). Une valeur élevée pénalise les plans nécessitant des accès aléatoires (Index Scan), favorisant le Seq Scan. Sur un SSD, on réduit souvent random_page_cost à 1.1-1.5 car les accès aléatoires sont presque aussi rapides que les séquentiels."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() {
        currentQuestion++;
        renderQuestion();
      }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Terminé !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points à revoir.' : 'Continuez à étudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() {
      currentQuestion = 0; score = 0; answered = false;
      renderQuestion();
    }

    renderQuestion();
  </script>
</body>
</html>
